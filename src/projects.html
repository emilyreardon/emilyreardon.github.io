<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emily Reardon | Projects</title>

<style>
body {
  font-family: Helvetica, Arial, sans-serif;
  margin: 0;
  padding: 0;
  color: #111;
  line-height: 1.55;
  font-size: 0.9rem;
}

.main-content {
  max-width: 900px;
  margin: auto;
  padding: 2rem;
}

.project-card {
  border-bottom: 1px solid #000;
  padding: 2rem 0;
}

.project-title {
  font-size: 1.2rem;
  font-weight: bold;
  margin-bottom: 0.5rem;
}

.project-byline {
  font-size: 0.8rem;
  color: #555;
  margin-top: 0.5rem;
}

.project-label {
  font-size: 0.7rem;
  font-weight: bold;
  text-transform: uppercase;
  margin-top: 1rem;
}

.project-body {
  margin: 0.3rem 0 0 0;
  font-size: 0.88rem;
}
</style>
</head>

<body>

<div class="main-content" id="projects-list"></div>

<script>
const projects = [
{
  id: "PER_001",
  title: "Ethical AI: Intimacy as Infrastructure",
  year: "2025",
  tools: "AI, TouchDesigner, OSC",
  rationale: "Explores intimacy as computational infrastructure.",
  description: "Interactive AI system responding to embodied input."
},
{
  id: "PER_002",
  title: "Projection Mapping Experiments",
  year: "2026",
  tools: "MadMapper",
  rationale: "Early experiments in projection mapping.",
  description: "Three short experimental mapping studies."
},
{
  id: "PER_004",
  title: "Scituate Harbor Perimeter: Ecoacoustic Study",
  year: "2026",
  tools: "iPhone, Audacity, After Effects, OpenStreetMap",
  rationale: "A coastal site held in personal and familial memory.",
  description: "A sonic and visual composition built from field recordings and mapped coastal fragments."
}
];

function renderProjects() {
  const container = document.getElementById("projects-list");

  projects.forEach(p => {
    const card = document.createElement("article");
    card.className = "project-card";

    const title = document.createElement("div");
    title.className = "project-title";
    title.textContent = p.title;
    card.appendChild(title);

    const byline = document.createElement("div");
    byline.className = "project-byline";
    byline.textContent = `${p.year} · ${p.tools}`;
    card.appendChild(byline);

    const r = document.createElement("div");
    r.className = "project-label";
    r.textContent = "Rationale";
    card.appendChild(r);

    const rText = document.createElement("div");
    rText.className = "project-body";
    rText.textContent = p.rationale;
    card.appendChild(rText);

    const d = document.createElement("div");
    d.className = "project-label";
    d.textContent = "Project Description";
    card.appendChild(d);

    const dText = document.createElement("div");
    dText.className = "project-body";
    dText.textContent = p.description;
    card.appendChild(dText);

    container.appendChild(card);
  });
}

window.addEventListener("DOMContentLoaded", renderProjects);
</script>

</body>
</html>
