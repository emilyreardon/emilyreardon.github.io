<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emily Reardon | Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,700&family=Josefin+Sans:wght@300&family=Poiret+One&family=Metamorphous&display=swap" rel="stylesheet">
  <style>
    /* Base */
    body {
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #111;
      line-height: 1.55;
      letter-spacing: 0.01em;
      font-size: 0.9rem;
    }


    .site-header,
    .main-content,
    .footer-container {
      max-width: 900px;
      margin: auto;
      padding-left: 2rem;
      padding-right: 2rem;
    }


    /* Header */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #000;
    }


    .brand h1 {
      font-size: 3rem;
      margin: 0;
      letter-spacing: 0.12rem;
    }


    .brand h1 a {
      text-decoration: none;
      color: #000;
      display: inline-flex;
      align-items: baseline;
      flex-wrap: nowrap;
    }


    .brand h1 a:hover { opacity: 0.7; }


    .tagline {
      font-size: 0.85rem;
      margin-top: 0.2rem;
    }


    /* Nav */
    .nav-container { display: flex; }


    .nav-links {
      list-style: none;
      display: flex;
      gap: 1.8rem;
      margin: 0;
      padding: 0;
    }


    .nav-links a {
      text-decoration: none;
      color: #000;
      position: relative;
    }


    .nav-links a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 1px;
      left: 0;
      bottom: -3px;
      background-color: #000;
      transition: width 0.25s ease;
    }


    .nav-links a:hover::after { width: 100%; }
    .nav-links a.current::after { width: 100%; }


    .hamburger {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }


    /* Name font-cycle animation */
    :root {
      --cycle-duration: 32s;
      --stagger-step: 2.5s;
    }


    .letter {
      display: inline-block;
      animation: name-font-cycle var(--cycle-duration) steps(1) infinite;
      animation-delay: calc(var(--i) * var(--stagger-step) * -1);
    }


    @keyframes name-font-cycle {
      0%   { font-family: "Fraunces", serif; }
      25%  { font-family: "Josefin Sans", sans-serif; }
      50%  { font-family: "Poiret One", cursive; }
      75%  { font-family: "Metamorphous", serif; }
      100% { font-family: "Fraunces", serif; }
    }


    /* Period dots */
    .period-dot {
      display: inline-block;
      border-radius: 50%;
      background-color: currentColor;
      vertical-align: baseline;
      line-height: 0;
      margin: 0 0.04em;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }


    .period-dot.sz-sm { width: 0.13em; height: 0.13em; }
    .period-dot.sz-md { width: 0.18em; height: 0.18em; }
    .period-dot.sz-lg { width: 0.24em; height: 0.24em; }
    .period-dot.visible { opacity: 1; }


    /* Filter bar */
    .filter-bar {
      max-width: 900px;
      margin: 1.6rem auto 0 auto;
      padding-left: 2rem;
      padding-right: 2rem;
      display: flex;
      gap: 1.4rem;
      border-bottom: 1px solid #000;
      padding-bottom: 0;
    }


    .filter-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0.35rem 0 0.45rem 0;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.78rem;
      font-weight: bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      color: #555;
      transition: color 0.18s ease, border-color 0.18s ease;
      margin-bottom: -1px;
    }


    .filter-btn:hover { color: #000; }


    .filter-btn.active {
      color: #000;
      border-bottom-color: #000;
    }


    /* Main */
    .main-content {
      margin-top: 2rem;
      margin-bottom: 3rem;
    }


    /* Project cards */
    .project-card {
      display: block;
      padding: 2rem 0;
      border-bottom: 1px solid #000;
    }


    .project-card:first-child { border-top: 1px solid #000; }


    .project-card.hidden { display: none; }


    .project-title {
      font-size: 1.15rem;
      font-weight: bold;
      margin: 0 0 0.35rem 0;
      letter-spacing: 0.02em;
      line-height: 1.3;
      text-align: left;
    }


    .project-image-wrap { width: 100%; margin: 0; }


    .project-image-wrap + .project-image-wrap { margin-top: 0.75rem; }


    .project-image {
      width: 100%;
      height: auto;
      display: block;
    }


    .project-image-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #999;
      letter-spacing: 0.05em;
    }


    /* GIF grid */
    .gif-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.5rem;
      margin: 0;
    }


    .gif-grid-cell {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #f0f0f0;
      position: relative;
    }


    .gif-grid-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }


    .gif-grid-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #999;
      letter-spacing: 0.05em;
    }


    .project-byline {
      font-size: 0.78rem;
      color: #555;
      margin: 0.45rem 0 0 0;
      text-align: left;
    }


    .project-body-wrap {
      width: 100%;
      margin-top: 1.2rem;
    }


    .project-label {
      font-size: 0.72rem;
      font-weight: bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0.9rem 0 0.15rem 0;
    }


    .project-label:first-child { margin-top: 0; }


    .project-body {
      font-size: 0.88rem;
      line-height: 1.55;
      margin: 0;
    }


    /* Footer */
    .site-footer { border-top: 1px solid #000; }


    .footer-container {
      font-size: 0.72rem;
      line-height: 1.4;
      padding-top: 1.2rem;
      padding-bottom: 2rem;
    }


    /* Mobile */
    @media (max-width: 768px) {
      .nav-container { display: none; }
      .hamburger { display: block; }
      .brand h1 { font-size: 1.8rem; }
      body { font-size: 0.88rem; }
      .gif-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>

  /* ── Extension fallback for non-GIF images ── */
  const EXTS = ['.jpg', '.jpeg', '.png', '.webp', '.gif'];


  function tryLoadImage(basePath, exts, imgEl, placeholder) {
    if (exts.length === 0) {
      imgEl.style.display = 'none';
      if (placeholder) placeholder.style.display = 'flex';
      return;
    }
    const [next, ...rest] = exts;
    const handler = () => { imgEl.onload = null; imgEl.onerror = null; };
    imgEl.onload = () => {
      handler();
      if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
      imgEl.style.display = 'block';
    };
    imgEl.onerror = () => { handler(); tryLoadImage(basePath, rest, imgEl, placeholder); };
    imgEl.src = basePath + next;
  }


  /* ── Build a standard image wrap (extension-tried) ── */
  function buildImageWrap(basePath, altText) {
    const wrap = document.createElement('div');
    wrap.className = 'project-image-wrap';


    const placeholder = document.createElement('div');
    placeholder.className = 'project-image-placeholder';
    placeholder.textContent = 'image';


    const img = document.createElement('img');
    img.className = 'project-image';
    img.alt = altText;
    img.style.display = 'none';


    wrap.appendChild(placeholder);
    wrap.appendChild(img);
    tryLoadImage(basePath, [...EXTS], img, placeholder);
    return wrap;
  }


  /* ── Build a GIF grid ── */
  function buildGifGrid(gifPaths, altText) {
    const grid = document.createElement('div');
    grid.className = 'gif-grid';


    gifPaths.forEach(function(src) {
      const cell = document.createElement('div');
      cell.className = 'gif-grid-cell';


      const ph = document.createElement('div');
      ph.className = 'gif-grid-placeholder';
      ph.textContent = 'loading';


      const img = document.createElement('img');
      img.alt = altText;
      img.style.display = 'none';
      img.onload = function() {
        img.onload = null;
        img.onerror = null;
        if (ph.parentNode) ph.parentNode.removeChild(ph);
        img.style.display = 'block';
      };
      img.onerror = function() {
        img.onload = null;
        img.onerror = null;
        img.style.display = 'none';
        ph.textContent = 'image';
      };
      img.src = src;


      cell.appendChild(ph);
      cell.appendChild(img);
      grid.appendChild(cell);
    });


    return grid;
  }


  /* ── Render ── */
  function renderProjects() {
    const container = document.getElementById('projects-list');


    projects.forEach(function(p) {
      const card = document.createElement('article');
      card.className = 'project-card';
      card.dataset.type = p.type;


      /* title */
      const title = document.createElement('h2');
      title.className = 'project-title';
      title.textContent = p.title;
      card.appendChild(title);


      /* media: gif grid OR one/two standard images */
      if (p.gifPaths && p.gifPaths.length) {
        card.appendChild(buildGifGrid(p.gifPaths, p.title));
      } else if (p.imagePaths && p.imagePaths.length) {
        p.imagePaths.forEach(function(basePath) {
          card.appendChild(buildImageWrap(basePath, p.title));
        });
      }


      /* byline */
      const byline = document.createElement('p');
      byline.className = 'project-byline';
      byline.textContent = p.year + ', ' + p.tools;
      card.appendChild(byline);


      /* body copy */
      const bodyWrap = document.createElement('div');
      bodyWrap.className = 'project-body-wrap';


      let bodyHTML =
        '<p class="project-label">Rationale</p>' +
        '<p class="project-body">' + p.rationale.replace(/\n/g, '<br>') + '</p>' +
        '<p class="project-label">Project Description</p>' +
        '<p class="project-body">' + p.description.replace(/\n/g, '<br>') + '</p>';


      if (p.role) {
        bodyHTML +=
          '<p class="project-label">My Role</p>' +
          '<p class="project-body">' + p.role + '</p>';
      }


      bodyWrap.innerHTML = bodyHTML;
      card.appendChild(bodyWrap);
      container.appendChild(card);
    });


    updateFirstVisibleBorder();
  }


  /* ── Filter logic ── */
  function updateFirstVisibleBorder() {
    const cards = document.querySelectorAll('.project-card');
    let foundFirst = false;
    cards.forEach(function(card) {
      card.style.borderTop = '';
      if (!card.classList.contains('hidden') && !foundFirst) {
        card.style.borderTop = '1px solid #000';
        foundFirst = true;
      }
    });
  }


  function applyFilter(filter) {
    const cards = document.querySelectorAll('.project-card');
    cards.forEach(function(card) {
      if (filter === 'all' || card.dataset.type === filter) {
        card.classList.remove('hidden');
      } else {
        card.classList.add('hidden');
      }
    });
    updateFirstVisibleBorder();
  }


  document.getElementById('filter-bar').addEventListener('click', function(e) {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    applyFilter(btn.dataset.filter);
  });


  renderProjects();




  /* ── Dot animation ── */
  const MAX_DOTS  = 7;
  const NUM_SLOTS = 12;


  function buildSlotPool() {
    const pool = [];
    const firstNameWeight = 10;
    const lastNameWeight  = 3;
    for (let i = 0; i < NUM_SLOTS; i++) {
      const w = i <= 4 ? firstNameWeight : lastNameWeight;
      for (let k = 0; k < w; k++) pool.push(i);
    }
    return pool;
  }
  const SLOT_POOL = buildSlotPool();


  function randomSlot() {
    return SLOT_POOL[Math.floor(Math.random() * SLOT_POOL.length)];
  }


  let liveSlots = new Map();
  let frontier  = 0;


  function getLetterSpan(slotIndex) {
    return document.querySelector('[data-slot="' + slotIndex + '"]');
  }


  const SIZES = ['sz-sm', 'sz-md', 'sz-lg'];


  function createDot(letterSpan) {
    const dot = document.createElement('span');
    dot.className = 'period-dot ' + SIZES[Math.floor(Math.random() * SIZES.length)];
    letterSpan.parentNode.insertBefore(dot, letterSpan.nextSibling);
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { dot.classList.add('visible'); });
    });
    return dot;
  }


  function removeDot(dot) {
    dot.classList.remove('visible');
    dot.addEventListener('transitionend', function() { dot.remove(); }, { once: true });
  }


  function totalDots() {
    let n = 0;
    liveSlots.forEach(function(arr) { n += arr.length; });
    return n;
  }


  function step() {
    const total     = totalDots();
    const canAdd    = total < MAX_DOTS;
    const canRemove = total > 0;
    let action;
    const r = Math.random();


    if (!canAdd && canRemove) {
      action = r < 0.5 ? 'remove' : 'shift';
    } else if (!canRemove) {
      action = 'add';
    } else {
      if (r < 0.45)      action = 'add';
      else if (r < 0.72) action = 'shift';
      else               action = 'remove';
    }


    if (action === 'add')         { doAdd(); }
    else if (action === 'remove') { doRemove(); }
    else                          { doRemove(); doAdd(); }
  }


  function doAdd() {
    let targetSlot;
    const scatter = Math.random() < 0.22;


    if (scatter) {
      targetSlot = randomSlot();
    } else {
      const advance = Math.floor(Math.random() * 4);
      targetSlot = (frontier + advance) % NUM_SLOTS;
      if (targetSlot > 4 && Math.random() < 0.70) {
        targetSlot = Math.floor(Math.random() * 5);
      }
    }


    const existing = liveSlots.get(targetSlot) || [];
    if (existing.length >= 2) {
      targetSlot = (targetSlot + 1) % NUM_SLOTS;
    }


    const letterSpan = getLetterSpan(targetSlot);
    if (!letterSpan) return;


    const dot = createDot(letterSpan);
    if (!liveSlots.has(targetSlot)) liveSlots.set(targetSlot, []);
    liveSlots.get(targetSlot).push(dot);
    frontier = targetSlot;
  }


  function doRemove() {
    if (liveSlots.size === 0) return;
    const slots    = Array.from(liveSlots.keys()).sort(function(a, b) { return a - b; });
    const pickLeft = Math.random() < 0.65;
    const targetSlot = pickLeft
      ? slots[0]
      : slots[Math.floor(Math.random() * slots.length)];


    const arr = liveSlots.get(targetSlot);
    if (!arr || arr.length === 0) return;


    const dot = arr.shift();
    removeDot(dot);
    if (arr.length === 0) liveSlots.delete(targetSlot);
  }


  function scheduleNext() {
    let delay;
    const r = Math.random();
    if (r < 0.12) {
      delay = 3000 + Math.random() * 2000;
    } else if (r < 0.30) {
      delay = 800 + Math.random() * 400;
    } else {
      delay = 1200 + Math.random() * 800;
    }
    setTimeout(function() { step(); scheduleNext(); }, delay);
  }


  function init() {
    const seedSlots = [1, 3, 4];
    seedSlots.forEach(function(s) {
      const letterSpan = getLetterSpan(s);
      if (!letterSpan) return;
      const dot = createDot(letterSpan);
      if (!liveSlots.has(s)) liveSlots.set(s, []);
      liveSlots.get(s).push(dot);
    });
    frontier = 4;
    scheduleNext();
  }


  init();


  const hamburger    = document.querySelector('.hamburger');
  const navContainer = document.getElementById('nav-container');
  if (hamburger && navContainer) {
    hamburger.addEventListener('click', function() {
      const isVisible = navContainer.style.display === 'flex';
      navContainer.style.display = isVisible ? 'none' : 'flex';
    });
  }
</script>
